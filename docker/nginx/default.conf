server {
    listen 80 default_server;
    server_name _;

    root /var/www/public;
    index index.php;

    # Pass Host header through so Laravel can resolve the tenant from subdomain
    proxy_set_header Host $host;

    # Health check
    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   php-fpm:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        # Forward original host so ResolveTenant middleware sees the subdomain
        fastcgi_param  HTTP_HOST $http_host;
        fastcgi_param  SERVER_NAME $http_host;

        fastcgi_read_timeout 60;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Static assets — long cache
    location ~* \.(css|js|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    client_max_body_size 25M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
