name: inteteam_cms

# ─── Shared config ──────────────────────────────────────────────────────────
x-php-env: &php-env
  env_file: .env
  environment:
    APP_ENV: ${APP_ENV:-local}

x-php-base: &php-base
  build:
    context: .
    dockerfile: docker/php/Dockerfile
    args:
      UID: ${UID:-1000}
      GID: ${GID:-1000}
  volumes:
    - .:/var/www
    - vendor_cache:/var/www/vendor
  <<: *php-env
  depends_on:
    mariadb:
      condition: service_healthy
    redis:
      condition: service_healthy

# ─── Services ───────────────────────────────────────────────────────────────
services:

  # ── PHP-FPM ─────────────────────────────────────────────────────────────
  php-fpm:
    <<: *php-base
    container_name: cms_php
    restart: unless-stopped
    profiles: [dev, prod]

  # ── Queue worker ────────────────────────────────────────────────────────
  queue:
    <<: *php-base
    container_name: cms_queue
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    profiles: [dev, prod]

  # ── Nginx ───────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: cms_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8090}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php-fpm
    profiles: [dev, prod]

  # ── MariaDB ─────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11.8
    container_name: cms_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MARIADB_DATABASE: ${DB_DATABASE:-inteteam_cms}
      MARIADB_USER: ${DB_USERNAME:-cms}
      MARIADB_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: [dev, prod]

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cms_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: [dev, prod]

  # ── phpMyAdmin (dev only) ────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: cms_phpmyadmin
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8091}:80"
    environment:
      PMA_HOST: mariadb
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
    depends_on:
      mariadb:
        condition: service_healthy
    profiles: [dev]

  # ── Mailpit (dev only) ───────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: cms_mailpit
    restart: unless-stopped
    ports:
      - "8029:8025"   # web UI
      - "1029:1025"   # SMTP
    profiles: [dev]

  # ── Node / Vite (dev only) ───────────────────────────────────────────────
  npm:
    image: node:22-alpine
    container_name: cms_node
    working_dir: /var/www
    volumes:
      - .:/var/www
      - node_modules_cache:/var/www/node_modules
    ports:
      - "${VITE_PORT:-5190}:5173"
    profiles: [dev]
    # Used as a one-off runner: docker compose run --rm npm run build
    # For HMR: docker compose run --rm npm run dev

# ─── Volumes ────────────────────────────────────────────────────────────────
volumes:
  mariadb_data:
  redis_data:
  vendor_cache:
  node_modules_cache:
